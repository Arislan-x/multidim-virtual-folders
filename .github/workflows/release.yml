name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$MANIFEST_VERSION" ] || [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag, manifest.json, and package.json versions must match."
            echo "tag=$VERSION manifest=$MANIFEST_VERSION package=$PACKAGE_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Package plugin zip
        run: |
          mkdir -p dist/multidim-virtual-folders
          cp main.js manifest.json styles.css dist/multidim-virtual-folders/
          cd dist
          zip -r multidim-virtual-folders.zip multidim-virtual-folders

      - name: Extract release notes
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const version = process.env.GITHUB_REF_NAME;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
          const lines = changelog.split(/\r?\n/);
          const start = lines.findIndex((line) => line.trim() === `## ${version}`);
          const end =
            start < 0
              ? -1
              : lines.findIndex(
                  (line, index) => index > start && line.startsWith("## ")
                );
          const notes =
            start >= 0
              ? lines.slice(start + 1, end < 0 ? lines.length : end).join("\n").trim()
              : `Release ${version}`;
          fs.writeFileSync("dist/release-notes.md", notes + "\n");
          NODE

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/multidim-virtual-folders.zip
            main.js
            manifest.json
            styles.css
            versions.json
