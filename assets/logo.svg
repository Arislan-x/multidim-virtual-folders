<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MultiDim Virtual Folders logo</title>
  <desc id="desc">A dimensional folder mark with three connected virtual folder planes.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="52" x2="448" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5f94b8"/>
      <stop offset="0.52" stop-color="#7b8fc4"/>
      <stop offset="1" stop-color="#c65f6a"/>
    </linearGradient>
    <linearGradient id="folder" x1="128" y1="152" x2="394" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8ea"/>
      <stop offset="1" stop-color="#f3d8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1d2430" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#bg)"/>
  <path d="M110 342c78-86 150-149 292-206" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.34"/>
  <path d="M118 176c90 16 174 50 276 154" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.26"/>

  <g filter="url(#shadow)">
    <path d="M132 176c0-20 16-36 36-36h58c12 0 22 5 30 14l20 22h82c20 0 36 16 36 36v142c0 20-16 36-36 36H168c-20 0-36-16-36-36V176z" fill="url(#folder)"/>
    <path d="M132 212h262" stroke="#c79a4b" stroke-width="14" stroke-linecap="round" opacity="0.48"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="18">
    <path d="M176 318h72l52-64h62" stroke="#5f9a8b"/>
    <path d="M176 318h58l68 54" stroke="#c65f6a"/>
    <path d="M176 318l52-74h88" stroke="#7b8fc4"/>
  </g>

  <g>
    <circle cx="176" cy="318" r="22" fill="#263445"/>
    <circle cx="248" cy="318" r="18" fill="#5f9a8b"/>
    <circle cx="362" cy="254" r="18" fill="#5f9a8b"/>
    <circle cx="302" cy="372" r="18" fill="#c65f6a"/>
    <circle cx="316" cy="244" r="18" fill="#7b8fc4"/>
  </g>
</svg>
